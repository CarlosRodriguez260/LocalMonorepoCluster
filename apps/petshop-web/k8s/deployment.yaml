webVersion: apps/v1
kind: Deployment
metadata:
  name: petshop-web
  namespace: petshop-web-testspace
  labels:
    app: petshop-web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petshop-web-app
  template:
    metadata:
      labels:
        app: petshop-web-app
    spec:
      containers:
      - name: petshop-web-app
        image: petshop-web:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"